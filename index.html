<!DOCTYPE html>
<html lang="hi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

    <!-- ⛔ TEMPORARILY BLOCKING INDEXING — Remove these 3 lines when ready to launch publicly -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="bingbot" content="noindex, nofollow">
    <meta name="description" content="English Vidya — हिंदी माध्यम के छात्रों के लिए बेहतरीन अंग्रेजी सीखने का मंच। Grammar, Vocabulary, Flashcards सब एक जगह।">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>English Vidya — अंग्रेजी सीखो, आत्मविश्वास बढ़ाओ</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Fonts: Inter for body, Outfit for headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- Inline Critical: Prevent FOUC (Flash of Unstyled Content) -->
    <script>
      (function(){
        var t = localStorage.getItem('ev-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
</head>
<body>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- 1. SCROLL PROGRESS BAR                             -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div class="scroll-progress-track" aria-hidden="true">
        <div class="scroll-progress-bar" id="scroll-progress"></div>
    </div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- 2. APP HEADER (Sticky, Glassmorphism)               -->
    <!-- ═══════════════════════════════════════════════════ -->
    <header class="app-header" id="app-header">
        <div class="header-left">
            <a href="#/" class="logo" id="logo-link" aria-label="English Vidya Home">
                <span class="logo-mark">ॐ</span>
                <span class="logo-text">English <span class="logo-accent">Vidya</span></span>
            </a>
        </div>
        <div class="header-right">
            <!-- Search Trigger -->
            <button class="header-btn" id="search-trigger-btn" aria-label="खोजें (Search)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            </button>
            <!-- Theme Toggle -->
            <button class="header-btn" id="theme-toggle-btn" aria-label="Theme बदलें">
                <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- 3. SEARCH OVERLAY (Full-screen Zero-Cost Search)    -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div class="search-overlay" id="search-overlay" role="dialog" aria-label="शब्द खोजें">
        <div class="search-overlay-header">
            <div class="search-input-wrap">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="search-input" placeholder="कोई भी अंग्रेजी शब्द खोजें…" autocomplete="off" autocapitalize="off" spellcheck="false">
                <button class="search-close-btn" id="search-close-btn" aria-label="बंद करें">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>
        <div class="search-results-area" id="search-results">
            <!-- Recent searches & results render here -->
            <div class="search-placeholder">
                <p class="search-hint">🔍 ऊपर टाइप करें — तुरंत results आएंगे</p>
                <div id="recent-searches-container"></div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- 4. MAIN CONTENT CONTAINER (SPA Routing Target)      -->
    <!-- ═══════════════════════════════════════════════════ -->
    <main class="app-main" id="app-content">
        <!-- All screen content renders here dynamically via app.js -->
        <div class="loading-screen" id="initial-loader">
            <div class="loader-spinner"></div>
            <p class="loader-text">English Vidya लोड हो रहा है...</p>
        </div>
    </main>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- 5. BOTTOM NAVIGATION (Mobile-First, Premium)        -->
    <!-- ═══════════════════════════════════════════════════ -->
    <nav class="bottom-nav" id="bottom-nav" aria-label="Main Navigation">
        <a href="#/" class="nav-item active" data-route="home" id="nav-home">
            <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>होम</span>
        </a>
        <a href="#/grammar" class="nav-item" data-route="grammar" id="nav-grammar">
            <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span>Grammar</span>
        </a>
        <a href="#/dictionary" class="nav-item" data-route="dictionary" id="nav-dictionary">
            <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <span>शब्दकोश</span>
        </a>
        <a href="#/flashcards" class="nav-item" data-route="flashcards" id="nav-flashcards">
            <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 4v16"/></svg>
            <span>Flashcards</span>
        </a>
        <a href="#/profile" class="nav-item" data-route="profile" id="nav-profile">
            <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>प्रोफ़ाइल</span>
        </a>
    </nav>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- 6. TOOLTIP POPOVER (Global, reused across screens)  -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div class="tooltip-popover" id="tooltip-popover" role="tooltip" aria-hidden="true"></div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- 7. TOAST NOTIFICATION CONTAINER                     -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <!-- Core Application Script -->
    <script src="./js/app.js"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
      navigator.serviceWorker.register('./service-worker.js')
            .then(function(reg) { console.log('[SW] Registered:', reg.scope); })
            .catch(function(err) { console.warn('[SW] Registration failed:', err); });
        });
      }
    </script>
</body>
</html>
