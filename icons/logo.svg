<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left book page -->
  <path d="M9 73 L50 66 L50 29 L9 36 Z" fill="#ffffff" opacity="0.97"/>
  <!-- Right book page -->
  <path d="M91 73 L50 66 L50 29 L91 36 Z" fill="#dde4f0" opacity="0.92"/>
  <!-- Left bracket [ -->
  <path d="M14 32 L9 32 L9 74 L14 74" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Right bracket ] -->
  <path d="M86 32 L91 32 L91 74 L86 74" fill="none" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Bottom spine orange accent curve -->
  <path d="M9 73 Q30 82 50 79 Q70 82 91 73" stroke="#E87722" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Orange glow under spine -->
  <path d="M15 75 Q50 84 85 75" stroke="#F5A623" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- E letter on left page -->
  <text x="30" y="63" font-family="Georgia,'Times New Roman',serif" font-size="29" font-weight="900" fill="#0d1b3e" text-anchor="middle" font-style="italic">E</text>
  <!-- V letter on right page -->
  <text x="70" y="63" font-family="Georgia,'Times New Roman',serif" font-size="29" font-weight="900" fill="#0d1b3e" text-anchor="middle" font-style="italic">V</text>
  <!-- Large golden feather/quill - body -->
  <path d="M50 29 C53 20 55 13 52 5 C51 3 50 2 49 3 C46 6 44 13 47 22 C48 25 49 27 50 29Z" fill="#F5A623"/>
  <!-- Feather highlight -->
  <path d="M50 25 C51 18 52 12 51 7" stroke="#FFD166" stroke-width="1.2" fill="none" opacity="0.7" stroke-linecap="round"/>
  <!-- Quill center vein -->
  <line x1="50" y1="28" x2="50" y2="4" stroke="#B8730A" stroke-width="0.8" opacity="0.6"/>
  <!-- Left feather vanes -->
  <path d="M49 24 C45 22 41 21 38 22" stroke="#F5A623" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M49 19 C44 17 39 16 36 18" stroke="#F5A623" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M49 14 C45 12 41 11 38 13" stroke="#F5A623" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M50 10 C47 8 44 7 42 9" stroke="#F5A623" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Right feather vanes -->
  <path d="M51 24 C55 22 59 21 62 22" stroke="#F5A623" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M51 19 C56 17 61 16 64 18" stroke="#F5A623" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M51 14 C55 12 59 11 62 13" stroke="#F5A623" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M50 10 C53 8 56 7 58 9" stroke="#F5A623" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
