<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vidya</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c1222;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(96, 165, 250, 0.1);
            border-radius: 50%;
            border-top-color: #60a5fa;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script type="text/javascript">
        // 🛡️ SPA Redirect Hack for GitHub Pages
        (function() {
            var pathSegmentsToKeep = 0;
            var l = window.location;
            
            // Generate direct routing parameters
            var redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
                '/?p=' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash;
                
            l.replace(redirectUrl);
        })();
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="spinner" aria-hidden="true"></div>
        <p style="font-size: 0.95rem; opacity: 0.85;">लोड हो रहा है, कृपया प्रतीक्षा करें...</p>
    </div>
</body>
</html>
